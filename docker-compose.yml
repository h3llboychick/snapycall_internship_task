services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consultation_booking}
      POSTGRES_USER: ${POSTGRES_USER:-booking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-booking}:${POSTGRES_PASSWORD:-booking}@database:5432/${POSTGRES_DB:-consultation_booking}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${SERVER_PORT:-3000}:3000"

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-8080}:80"

volumes:
  postgres_data:
